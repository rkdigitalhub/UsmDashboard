<div class="login-wrapper">

<div class="login-card">

<div class="logo">
  <img src="assets/usm_final.png" alt="USM Logo">
</div>

<form (ngSubmit)="login()">

  <input
    type="text"
    placeholder="User ID (USM7xxxx)"
    [(ngModel)]="userId"
    (ngModelChange)="clearMessages()"
    name="userId"
    maxlength="8"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
    (ngModelChange)="clearMessages()"
    name="password"
    maxlength="8"
  />

  <button class="text-link" type="button" (click)="requestPasswordHelp()">
    Forgot Password?
  </button>

  <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="info" *ngIf="infoMessage">{{ infoMessage }}</div>

  <button class="btn-gold" [disabled]="!canLogin">LOGIN</button>

</form>

</div>

</div>
