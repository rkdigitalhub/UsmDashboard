<div class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="layoutUi.mobileMenuOpen">

  <button class="toggle-btn" type="button" (click)="toggleSidebar()" [attr.aria-label]="isCollapsed ? 'Expand menu' : 'Collapse menu'">
    <span [class.rotated]="isCollapsed"><fa-icon [icon]="collapseIcon"></fa-icon></span>
  </button>

  <div class="logo">
    <img src="assets/usm_final.png" alt="USM Logo" />
  </div>

  <nav>
    <a
      *ngFor="let item of navigationItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      [attr.title]="isCollapsed ? item.label : null"
      (click)="onNavItemClick()">
      <span class="menu-icon" [class.icon-wheel]="item.icon === 'spin'" aria-hidden="true"><fa-icon [icon]="getIcon(item)"></fa-icon></span>
      <span class="menu-label">{{ item.label }}</span>
    </a>
  </nav>
</div>
