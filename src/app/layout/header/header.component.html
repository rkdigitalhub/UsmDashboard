<div class="header">
  <button class="menu-toggle" type="button" (click)="toggleMenu()" aria-label="Open menu">
    &#9776;
  </button>

  <div class="menu">{{ pageTitle }}</div>

  <div class="right">
    <input placeholder="Search" />

    <button class="btn-logout" (click)="logout()">Logout</button>

    <div class="profile" title="Profile" (click)="goToProfile()">
      <span class="avatar">👤</span>
    </div>
  </div>

</div>
