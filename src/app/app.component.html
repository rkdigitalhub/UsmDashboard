<div class="app-container">
  <div class="app-layout" [class.with-layout]="showLayout">
    <app-sidebar *ngIf="showLayout"></app-sidebar>
    <div
      class="sidebar-backdrop"
      *ngIf="showLayout && layoutUi.mobileMenuOpen"
      (click)="layoutUi.closeMobileMenu()"></div>
    <div class="main" [class.with-layout]="showLayout">
      <app-header *ngIf="showLayout"></app-header>
      <router-outlet></router-outlet>
    </div>
  </div>

  <div class="loading-overlay" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>
</div>
