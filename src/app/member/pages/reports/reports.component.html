<div class="page">
  <h4 class="page-title"><fa-icon [icon]="reportsIcon"></fa-icon><span>Monthly Earnings Summary</span></h4>
  <div class="table-wrap" role="region" aria-label="Reports data table">
    <table>
      <thead>
        <tr>
          <th *ngFor="let header of headers">{{ header }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows" [class.note-row]="row.isNoteRow">
          <td>{{ row.round }}</td>
          <td>{{ row.investment }}</td>
          <td>{{ row.profitFrom25 }}</td>
          <td>{{ row.settlement }}</td>
          <td>{{ row.interest }}</td>
          <td>{{ row.total }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
