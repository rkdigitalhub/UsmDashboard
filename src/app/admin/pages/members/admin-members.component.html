<div class="admin-content-stack">
  <section class="admin-workspace-grid">
    <article class="admin-card admin-page-hero-card">
      <div class="admin-panel-header">
        <h2>Member Directory</h2>
        <span class="admin-pill">Core roster only</span>
      </div>

      <div class="admin-key-figure-grid">
        <div class="admin-key-figure"><span>Total users</span><strong>{{ members.length }} profiles</strong></div>
        <div class="admin-key-figure"><span>Active groups</span><strong>{{ groups.length }} teams</strong></div>
        <div class="admin-key-figure"><span>Current selection</span><strong>{{ selectedUserId || 'No user selected' }}</strong></div>
      </div>
    </article>

    <article class="admin-note-card">
      <div class="admin-panel-header">
        <h2>Edit User</h2>
      </div>
      <div class="admin-form-grid" *ngIf="selectedUserId">
        <div class="admin-field">
          <label>User ID</label>
          <input [(ngModel)]="memberForm.userId" [ngModelOptions]="{ standalone: true }" type="text" readonly>
        </div>
        <div class="admin-field">
          <label>Username</label>
          <input [(ngModel)]="memberForm.username" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field admin-full-span">
          <label>Name</label>
          <input [(ngModel)]="memberForm.name" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field">
          <label>Email</label>
          <input [(ngModel)]="memberForm.email" [ngModelOptions]="{ standalone: true }" type="email">
        </div>
        <div class="admin-field">
          <label>Mobile</label>
          <input [(ngModel)]="memberForm.mobile" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field">
          <label>Team</label>
          <mat-form-field appearance="outline" class="admin-material-field">
            <mat-select [(ngModel)]="memberForm.team" [ngModelOptions]="{ standalone: true }" panelClass="admin-select-panel">
              <mat-option *ngFor="let group of groups" [value]="group.groupName">{{ group.groupName }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="admin-field">
          <label>Status</label>
          <input [(ngModel)]="memberForm.status" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field admin-full-span">
          <label>Address</label>
          <textarea [(ngModel)]="memberForm.address" [ngModelOptions]="{ standalone: true }"></textarea>
        </div>
        <div class="admin-field">
          <label>City</label>
          <input [(ngModel)]="memberForm.city" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field">
          <label>Pincode</label>
          <input [(ngModel)]="memberForm.pincode" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
      </div>
      <div class="admin-toolbar-actions admin-toolbar-actions-compact" *ngIf="selectedUserId">
        <button class="admin-button" type="button" (click)="saveMember()">Save User</button>
        <button class="admin-button-secondary" type="button" (click)="editMember(profileOwner)">Reset</button>
      </div>
      <div class="admin-status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
    </article>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>User Master</h2>
    </div>

    <app-data-grid [columnDefs]="memberColumnDefs" [rowData]="members" [enableExport]="true" exportFileName="admin-members" height="420px"></app-data-grid>
  </section>
</div>
