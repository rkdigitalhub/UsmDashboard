<div class="admin-content-stack">
  <section class="admin-note-card" *ngIf="statusMessage">
    <div class="admin-status-message">{{ statusMessage }}</div>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>Online Payment Queue</h2>
      <div class="admin-toolbar-actions">
        <span class="admin-pill">UPI and bank transfer</span>
      </div>
    </div>

    <app-data-grid [columnDefs]="onlinePaymentColumnDefs" [rowData]="onlinePayments" [enableExport]="true" exportFileName="admin-online-payments" height="360px"></app-data-grid>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>Hand Cash Monitoring</h2>
      <div class="admin-toolbar-actions">
        <span class="admin-pill warning">Collection audit</span>
        <button class="admin-icon-button" type="button" title="Export payment register" aria-label="Export payment register" (click)="exportPayments()"><fa-icon [icon]="exportIcon"></fa-icon></button>
      </div>
    </div>

    <app-data-grid [columnDefs]="handCashColumnDefs" [rowData]="handCashPayments" [enableExport]="true" exportFileName="admin-hand-cash-ledger" height="360px"></app-data-grid>
  </section>
</div>
