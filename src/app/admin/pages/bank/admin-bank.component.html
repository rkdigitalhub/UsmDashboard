<div class="admin-content-stack">
  <section class="admin-note-card">
      <div class="admin-panel-header">
        <h2>Edit Bank Profile</h2>
        <span class="admin-pill">Payout details</span>
      </div>
      <div class="admin-form-grid" *ngIf="selectedUserId">
        <div class="admin-field"><label>User ID</label><input [(ngModel)]="bankForm.userId" [ngModelOptions]="{ standalone: true }" type="text" readonly></div>
        <div class="admin-field"><label>Name</label><input [(ngModel)]="bankForm.name" [ngModelOptions]="{ standalone: true }" type="text" readonly></div>
        <div class="admin-field"><label>Team</label><input [(ngModel)]="bankForm.team" [ngModelOptions]="{ standalone: true }" type="text" readonly></div>
        <div class="admin-field"><label>Bank Name</label><input [(ngModel)]="bankForm.bankName" [ngModelOptions]="{ standalone: true }" type="text"></div>
        <div class="admin-field"><label>Branch</label><input [(ngModel)]="bankForm.branch" [ngModelOptions]="{ standalone: true }" type="text"></div>
        <div class="admin-field"><label>Account Number</label><input [(ngModel)]="bankForm.accountNumber" [ngModelOptions]="{ standalone: true }" type="text"></div>
        <div class="admin-field"><label>IFSC</label><input [(ngModel)]="bankForm.ifscCode" [ngModelOptions]="{ standalone: true }" type="text"></div>
        <div class="admin-field"><label>UPI ID</label><input [(ngModel)]="bankForm.upiId" [ngModelOptions]="{ standalone: true }" type="text"></div>
      </div>
      <div class="admin-toolbar-actions admin-toolbar-actions-compact">
        <button class="admin-button" type="button" (click)="saveProfile()">Save Bank Profile</button>
        <button class="admin-button-secondary" type="button" (click)="applyBulkTemplate()">Bulk Update Template</button>
      </div>
      <div class="admin-status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>User Bank Profiles</h2>
      <div class="admin-toolbar-actions">
        <button class="admin-icon-button" type="button" title="Apply bulk bank template" aria-label="Apply bulk bank template" (click)="applyBulkTemplate()">
          <fa-icon [icon]="refreshIcon"></fa-icon>
        </button>
      </div>
    </div>

    <app-data-grid [columnDefs]="profileColumnDefs" [rowData]="profiles" [enableExport]="true" exportFileName="admin-bank-profiles" height="420px"></app-data-grid>
  </section>
</div>
