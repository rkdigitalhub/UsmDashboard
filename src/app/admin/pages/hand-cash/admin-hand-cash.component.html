<div class="admin-content-stack">
  <section class="admin-note-card" *ngIf="statusMessage">
    <div class="admin-status-message">{{ statusMessage }}</div>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>Hand Cash Register</h2>
      <div class="admin-toolbar-actions">
        <button class="admin-icon-button" type="button" title="Export hand cash register" aria-label="Export hand cash register" (click)="exportRegister()"><fa-icon [icon]="exportIcon"></fa-icon></button>
      </div>
    </div>

    <app-data-grid [columnDefs]="paymentColumnDefs" [rowData]="payments" [enableExport]="true" exportFileName="admin-hand-cash-payments" height="420px"></app-data-grid>
  </section>
</div>
