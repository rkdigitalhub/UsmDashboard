<div class="admin-content-stack">
  <section class="admin-workspace-grid">
    <article class="admin-card admin-page-hero-card">
      <div class="admin-panel-header">
        <h2>Team Setup Workspace</h2>
        <span class="admin-pill">500000 plan template</span>
      </div>

      <div class="admin-key-figure-grid">
        <div class="admin-key-figure">
          <span>Total capacity</span>
          <strong>{{ totalCapacity }} users</strong>
        </div>
        <div class="admin-key-figure">
          <span>Filled seats</span>
          <strong>{{ filledSeats }} users</strong>
        </div>
        <div class="admin-key-figure">
          <span>Open vacancies</span>
          <strong>{{ totalCapacity - filledSeats }} users</strong>
        </div>
      </div>
    </article>

    <article class="admin-note-card">
      <div class="admin-panel-header">
        <h2>{{ editingGroupId ? 'Edit Team' : 'Create Team' }}</h2>
      </div>
      <div class="admin-form-grid">
        <div class="admin-field">
          <label>Created On</label>
          <input [(ngModel)]="teamForm.date" [ngModelOptions]="{ standalone: true }" type="date">
        </div>
        <div class="admin-field">
          <label>Status</label>
          <mat-form-field appearance="outline" class="admin-material-field">
            <mat-select [(ngModel)]="teamForm.status" [ngModelOptions]="{ standalone: true }" panelClass="admin-select-panel">
              <mat-option value="Open">Open</mat-option>
              <mat-option value="Live">Live</mat-option>
              <mat-option value="Filling">Filling</mat-option>
              <mat-option value="Closed">Closed</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="admin-field admin-full-span">
          <label>Team Name</label>
          <input [(ngModel)]="teamForm.groupName" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field">
          <label>Plan Value</label>
          <input [(ngModel)]="teamForm.planAmount" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field">
          <label>Tenure Months</label>
          <input [(ngModel)]="teamForm.tenureMonths" [ngModelOptions]="{ standalone: true }" type="number">
        </div>
        <div class="admin-field">
          <label>Total Members</label>
          <input [(ngModel)]="teamForm.totalMembers" [ngModelOptions]="{ standalone: true }" type="number">
        </div>
        <div class="admin-field">
          <label>Joined Members</label>
          <input [(ngModel)]="teamForm.joinedMembers" [ngModelOptions]="{ standalone: true }" type="number">
        </div>
        <div class="admin-field">
          <label>Rounds Completed</label>
          <input [(ngModel)]="teamForm.roundCompleted" [ngModelOptions]="{ standalone: true }" type="number">
        </div>
        <div class="admin-field">
          <label>Spin Date</label>
          <input [(ngModel)]="teamForm.spinDate" [ngModelOptions]="{ standalone: true }" type="date">
        </div>
        <div class="admin-field">
          <label>Spin Time</label>
          <input [(ngModel)]="teamForm.spinTime" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
        <div class="admin-field admin-full-span">
          <label>Monthly Window</label>
          <input [(ngModel)]="teamForm.monthlyWindow" [ngModelOptions]="{ standalone: true }" type="text">
        </div>
      </div>
      <div class="admin-toolbar-actions admin-toolbar-actions-compact">
        <button class="admin-button" type="button" (click)="saveGroup()">{{ editingGroupId ? 'Save Team' : 'Create Team' }}</button>
        <button class="admin-button-secondary" type="button" (click)="cancelEdit()">Clear</button>
      </div>
      <div class="admin-status-message" *ngIf="statusMessage">{{ statusMessage }}</div>
    </article>
  </section>

  <section class="admin-table-card">
    <div class="admin-table-toolbar">
      <h2>Team Portfolio</h2>
    </div>

    <app-data-grid [columnDefs]="groupColumnDefs" [rowData]="groups" [enableExport]="true" exportFileName="admin-groups" height="360px"></app-data-grid>

  </section>
</div>
